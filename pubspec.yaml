name: conversor_de_medidas_pro
description: >
  Conversor de unidades e calculadoras financeiras brasileiras.
  FGTS, Poupanca, Juros com CDI, cotacoes ao vivo. 100% offline.
publish_to: "none"
version: 2.3.2+9

environment:
  sdk: ">=3.0.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter
  provider: ^6.1.0
  google_mobile_ads: ^5.1.0
  shared_preferences: ^2.3.0
  google_fonts: ^6.2.1
  share_plus: ^7.2.2
  intl: ^0.19.0
  http: ^1.2.2
  file_picker: ^8.0.0
  image: ^4.1.3
  path_provider: ^2.1.1
  pdf: ^3.10.7
  archive: ^3.6.1
  xml: ^6.3.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0
  mockito: ^5.4.4
  build_runner: ^2.4.0

flutter:
  uses-material-design: true
